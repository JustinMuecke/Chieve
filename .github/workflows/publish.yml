name: Publish Docker Images

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: justinmuecke

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/User_Service
          push: true
          tags: ghcr.io/${{ env.OWNER }}/chieve/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push achievement-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/Achievement_Service
          push: true
          tags: ghcr.io/${{ env.OWNER }}/chieve/achievement-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push recommendation-service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/Recommendation_Service
          push: true
          tags: ghcr.io/${{ env.OWNER }}/chieve/recommendation-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ env.OWNER }}/chieve/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
