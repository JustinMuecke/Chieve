name: chieve

# ─── FILL THESE IN BEFORE DEPLOYING ──────────────────────────────────────────
# Replace every CHANGE_ME value with real secrets.
# Replace SERVER_IP with the LAN IP of this machine (e.g. 192.168.1.100).
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: chieve
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: chieve
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chieve -d chieve"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: CHANGE_ME
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: CHANGE_ME
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      /usr/bin/mc mb -p local/avatars;
      /usr/bin/mc mb -p local/guides;
      /usr/bin/mc anonymous set public local/avatars;
      /usr/bin/mc anonymous set public local/guides;
      exit 0;
      "

  user_service:
    image: ghcr.io/justinmuecke/chieve/user-service:latest
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: chieve
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: chieve
      JWT_SECRET: CHANGE_ME
      ENV: production
      GITHUB_CLIENT_ID: CHANGE_ME
      GITHUB_CLIENT_SECRET: CHANGE_ME
      STEAM_API_KEY: CHANGE_ME
      S3_URL: http://minio:9000
      S3_PUBLIC_URL: http://SERVER_IP:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: CHANGE_ME
      FRONTEND_URL: http://SERVER_IP
      OAUTH_CALLBACK_URL: http://SERVER_IP/api/user/auth/callback
      STEAM_CALLBACK_URL: http://SERVER_IP/api/user/steam/callback
      STEAM_REALM: http://SERVER_IP
      ACHIEVEMENT_SERVICE_URL: http://achievement_service:8001
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  achievement_service:
    image: ghcr.io/justinmuecke/chieve/achievement-service:latest
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: chieve
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: chieve
      JWT_SECRET: CHANGE_ME
      ENV: production
      REDIS_URL: redis://redis:6379/0
      USER_SERVICE_URL: http://user_service:8000
      STEAM_API_KEY: CHANGE_ME
      S3_URL: http://minio:9000
      S3_PUBLIC_URL: http://SERVER_IP:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: CHANGE_ME
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  celery_worker:
    image: ghcr.io/justinmuecke/chieve/achievement-service:latest
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: chieve
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: chieve
      JWT_SECRET: CHANGE_ME
      ENV: production
      REDIS_URL: redis://redis:6379/0
      USER_SERVICE_URL: http://user_service:8000
      STEAM_API_KEY: CHANGE_ME
      S3_URL: http://minio:9000
      S3_PUBLIC_URL: http://SERVER_IP:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: CHANGE_ME
    command: celery -A src.worker.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  recommendation_service:
    image: ghcr.io/justinmuecke/chieve/recommendation-service:latest
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: chieve
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: chieve
      JWT_SECRET: CHANGE_ME
      ENV: production
      REDIS_URL: redis://redis:6379/0
      ACHIEVEMENT_SERVICE_URL: http://achievement_service:8001
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      achievement_service:
        condition: service_started

  recommendation_celery_worker:
    image: ghcr.io/justinmuecke/chieve/recommendation-service:latest
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: chieve
      POSTGRES_PASSWORD: CHANGE_ME
      POSTGRES_DB: chieve
      JWT_SECRET: CHANGE_ME
      ENV: production
      REDIS_URL: redis://redis:6379/0
      ACHIEVEMENT_SERVICE_URL: http://achievement_service:8001
    command: celery -A src.worker.celery_app worker --beat --loglevel=info --concurrency=1 --queues=recommendation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/justinmuecke/chieve/frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - user_service
      - achievement_service
      - recommendation_service

volumes:
  postgres_data:
  minio_data:
